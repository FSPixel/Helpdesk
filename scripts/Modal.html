<script>
function openModalContent(article) {
  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <div class="modal-form-grid">
      <div class="full">
        <label>Article Title</label>
        <input id="m_title" type="text" value="${escapeAttr(article.title || '')}" placeholder="Fixing Wi-Fi dropouts">
      </div>
      <div>
        <label>Category</label>
        <select id="m_category"></select>
      </div>
      <div>
        <label>Visibility</label>
        <select id="m_visibility">
          <option value="public">Public</option>
          <option value="private">Private</option>
        </select>
      </div>
      <div>
        <label>Created By</label>
        <input id="m_createdBy" type="text" value="${escapeAttr(article.createdBy || '')}" placeholder="Jane Doe">
      </div>
      <div>
        <label>Tags</label>
        <input id="m_tags" type="text" value="${escapeAttr(article.tags || '')}" placeholder="wifi, router, network">
      </div>
      <div class="full">
        <label>Instructions</label>
        <textarea id="m_content" rows="8" placeholder="Write step-by-step instructions...">${escapeHtml(article.content || '')}</textarea>
      </div>
      <div class="full">
        <label>Attachment</label>
        <input id="m_file" type="file" accept="image/*,.pdf,.doc,.docx,.txt">
        <div id="m_existingAttachment" class="muted"></div>
      </div>
      <div class="full" style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveModalArticle('${escapeJs(article.id)}', '${escapeJs(article.attachmentUrl || '')}', '${escapeJs(article.attachmentName || '')}')">Save Changes</button>
      </div>
    </div>
  `;

  const select = document.getElementById('m_category');
  select.innerHTML = (appState.categories || []).map(c => `<option value="${escapeAttr(c.name)}">${escapeHtml(c.name)}</option>`).join('');
  select.value = article.category || '';
  document.getElementById('m_visibility').value = article.visibility || 'public';

  document.getElementById('m_existingAttachment').innerHTML = article.attachmentUrl
    ? `Current file: <a href="${article.attachmentUrl}" target="_blank">${escapeHtml(article.attachmentName || 'open')}</a>`
    : '';

  document.getElementById('modalWrap').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modalWrap').classList.add('hidden');
  document.getElementById('modalBody').innerHTML = '';
}

function saveModalArticle(id, existingAttachmentUrl, existingAttachmentName) {
  const title = document.getElementById('m_title').value.trim();
  const category = document.getElementById('m_category').value;
  const visibility = document.getElementById('m_visibility').value;
  const createdBy = document.getElementById('m_createdBy').value.trim();
  const tags = document.getElementById('m_tags').value.trim();
  const content = document.getElementById('m_content').value.trim();
  const file = document.getElementById('m_file').files[0];

  if (!title || !category || !content || !createdBy) {
    if (typeof toast === 'function') toast('Lengkapi field wajib di modal.', 'error');
    else alert('Lengkapi field wajib di modal.');
    return;
  }

  const payload = { id, title, category, visibility, tags, content, createdBy, existingAttachmentUrl, existingAttachmentName };

  if (file) {
    const reader = new FileReader();
    reader.onload = e => {
      payload.attachmentBase64 = e.target.result.split(',')[1];
      payload.attachmentName = file.name;
      payload.attachmentMime = file.type || 'application/octet-stream';
      submitModalSave(payload);
    };
    reader.readAsDataURL(file);
  } else {
    submitModalSave(payload);
  }
}

function submitModalSave(payload) {
  google.script.run
    .withSuccessHandler(() => {
      if (typeof toast === 'function') toast('Perubahan berhasil disimpan.');
      closeModal();
      resetForm();
      refreshAll(document.getElementById('searchBox').value.trim());
    })
    .withFailureHandler(err => {
      if (typeof showError === 'function') showError(err);
      else alert((err && err.message) ? err.message : err);
    })
    .saveArticle(payload);
}
</script>
