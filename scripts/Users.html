<script>
function openUsersEditor() {
  google.script.run
    .withSuccessHandler(renderUsersEditor)
    .withFailureHandler(showUsersError)
    .getUsersData();
}

function renderUsersEditor(data) {
  const rows = (data && data.users) ? data.users : [];
  const body = document.getElementById('usersBody');

  body.innerHTML = `
    <div class="toolbar" style="margin-bottom:12px">
      <button class="btn btn-primary" onclick="addUserRow()">Add Row</button>
      <button class="btn btn-secondary" onclick="saveUsersData()">Save Users</button>
    </div>

    <div class="table-wrap">
      <table class="table" id="usersTable">
        <thead>
          <tr>
            <th>Email</th>
            <th>Name</th>
            <th>Role</th>
            <th>Active</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td><input class="u-email" value="${escapeAttr(r.email || '')}"></td>
              <td><input class="u-name" value="${escapeAttr(r.name || '')}"></td>
              <td>
                <select class="u-role">
                  <option value="admin" ${r.role==='admin'?'selected':''}>admin</option>
                  <option value="editor" ${r.role==='editor'?'selected':''}>editor</option>
                  <option value="auditor" ${r.role==='auditor'?'selected':''}>auditor</option>
                  <option value="viewer" ${r.role==='viewer'?'selected':''}>viewer</option>
                </select>
              </td>
              <td>
                <select class="u-active">
                  <option value="TRUE" ${String(r.active).toUpperCase()!=='FALSE'?'selected':''}>TRUE</option>
                  <option value="FALSE" ${String(r.active).toUpperCase()==='FALSE'?'selected':''}>FALSE</option>
                </select>
              </td>
              <td><button class="btn btn-ghost" onclick="this.closest('tr').remove()">Delete</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  if (!rows.length) addUserRow();
}

function addUserRow() {
  const tbody = document.querySelector('#usersTable tbody');
  if (!tbody) return;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input class="u-email" placeholder="user@company.com"></td>
    <td><input class="u-name" placeholder="User Name"></td>
    <td>
      <select class="u-role">
        <option value="admin">admin</option>
        <option value="editor" selected>editor</option>
        <option value="auditor">auditor</option>
        <option value="viewer">viewer</option>
      </select>
    </td>
    <td>
      <select class="u-active">
        <option value="TRUE" selected>TRUE</option>
        <option value="FALSE">FALSE</option>
      </select>
    </td>
    <td><button class="btn btn-ghost" onclick="this.closest('tr').remove()">Delete</button></td>
  `;
  tbody.appendChild(tr);
}

function saveUsersData() {
  const rows = Array.from(document.querySelectorAll('#usersTable tbody tr')).map(tr => ([
    tr.querySelector('.u-email').value.trim(),
    tr.querySelector('.u-name').value.trim(),
    tr.querySelector('.u-role').value,
    tr.querySelector('.u-active').value
  ])).filter(r => r[0]);

  google.script.run
    .withSuccessHandler(() => {
      if (typeof toast === 'function') toast('Users saved.');
    })
    .withFailureHandler(showUsersError)
    .saveUsers(rows);
}

function showUsersError(err) {
  const msg = (err && err.message) ? err.message : String(err || 'Users error');
  if (typeof toast === 'function') toast(msg, 'error');
  else alert(msg);
  console.error(err);
}
</script>
