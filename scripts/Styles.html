<style>
:root{
  --bg:#eef3fb;
  --card:#ffffff;
  --line:#e5e7eb;
  --text:#1f2937;
  --muted:#6b7280;
  --blue:#2563eb;
  --blue2:#4f86e8;
  --green:#16a34a;
  --red:#dc2626;
  --shadow:0 2px 10px rgba(15,23,42,.08);
}

*{
  box-sizing:border-box;
}

html, body{
  width:100%;
  min-height:100%;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  color:var(--text);
  background:var(--bg);
}

input,select,textarea,button{
  pointer-events:auto;
  font-family:inherit;
}

.app-shell{
  max-width:1440px;
  margin:0 auto;
  min-height:100vh;
  background:#fff;
  position:relative;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 22px;
  border-bottom:1px solid var(--line);
  background:#fff;
  position:relative;
  z-index:2;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand-logo{
  font-weight:700;
  color:var(--blue);
  letter-spacing:.5px;
}

.brand-title{
  font-weight:700;
  line-height:1;
}

.brand-sub{
  font-size:12px;
  color:var(--muted);
}

.topbar-right{
  display:flex;
  align-items:center;
  gap:14px;
}

.role-badge{
  display:inline-flex;
  align-items:center;
  padding:6px 10px;
  border-radius:999px;
  background:#eff6ff;
  color:#1d4ed8;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
}

.user-pill{
  display:flex;
  align-items:center;
  gap:10px;
}

.user-avatar{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#dbeafe;
  display:grid;
  place-items:center;
  font-weight:700;
}

.user-name{
  font-size:14px;
  font-weight:700;
  line-height:1;
}

.user-role{
  font-size:12px;
  color:var(--muted);
}

.hero{
  padding:26px 22px 22px;
  text-align:center;
  background:linear-gradient(180deg, var(--blue2), #dbeafe);
  position:relative;
  z-index:1;
}

.hero h1{
  margin:0;
  font-size:30px;
}

.hero p{
  margin:6px 0 0;
  color:#111827;
}

.hero-search{
  display:flex;
  gap:10px;
  max-width:980px;
  margin:0 auto 16px;
}

.hero-search input{
  flex:1;
  padding:12px 14px;
  border:1px solid #d1d5db;
  border-radius:10px;
  outline:none;
  background:#fff;
}

.layout{
  display:grid;
  grid-template-columns:1.7fr 1fr;
  gap:18px;
  padding:18px 22px 24px;
  position:relative;
  z-index:1;
}

.section-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:4px 0 12px;
}

.section-head h2{
  margin:0;
  font-size:18px;
}

.total-count{
  font-size:13px;
  color:var(--muted);
}

.category-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:12px;
}

.category-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:18px;
  text-align:center;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:.15s ease;
  min-height:120px;
}

.category-card:hover{
  transform:translateY(-1px);
}

.category-icon{
  font-size:30px;
  margin-bottom:10px;
}

.category-name{
  font-weight:700;
}

.category-count{
  margin-top:4px;
  font-size:13px;
  color:var(--muted);
}

.article-list{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px 14px;
  box-shadow:var(--shadow);
  min-height:120px;
}

.article-item{
  padding:12px 0;
  border-bottom:1px solid #f1f5f9;
}

.article-item:last-child{
  border-bottom:none;
}

.article-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}

.article-title{
  font-weight:700;
  margin:0;
}

.article-meta{
  color:var(--muted);
  font-size:12px;
  margin-top:4px;
}

.article-content{
  color:#334155;
  font-size:13px;
  margin-top:6px;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  background:#eff6ff;
  color:#1d4ed8;
  font-size:12px;
  margin-left:6px;
  white-space:nowrap;
}

.row-actions{
  display:flex;
  gap:10px;
  flex-wrap:nowrap;
}

.link-btn{
  border:none;
  background:none;
  cursor:pointer;
  padding:0;
  font:inherit;
  color:var(--blue);
}

.link-danger{
  color:var(--red);
}

.side-panel{
  min-width:0;
}

.panel-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:16px;
  position:relative;
  z-index:3;
}

.panel-header{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
  margin-bottom:6px;
}

.panel-header h2{
  margin:0;
}

.panel-header p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:13px;
}

label{
  display:block;
  margin:12px 0 6px;
  font-size:13px;
  font-weight:700;
}

input,select,textarea{
  width:100%;
  border:1px solid #d1d5db;
  border-radius:10px;
  padding:10px 12px;
  font:inherit;
  outline:none;
  background:#fff;
}

input:disabled,select:disabled,textarea:disabled{
  opacity:1;
  cursor:text;
  background:#fff;
}

textarea{
  resize:vertical;
}

.form-actions{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.btn{
  border:none;
  border-radius:10px;
  padding:11px 14px;
  cursor:pointer;
  font:inherit;
  transition:.15s ease;
}

.btn:hover{
  filter:brightness(.98);
}

.btn-primary{
  background:var(--blue);
  color:#fff;
}

.btn-secondary{
  background:#e5e7eb;
  color:#111827;
}

.btn-ghost{
  background:#f8fafc;
  color:#111827;
  border:1px solid var(--line);
}

.muted{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
  word-break:break-all;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.46);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:1000;
}

.modal.hidden{
  display:none !important;
  pointer-events:none;
}

.hidden{
  display:none;
}

.modal-card{
  width:min(760px,100%);
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(15,23,42,.2);
}

.modal-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  padding:16px 18px;
  border-bottom:1px solid var(--line);
}

.modal-head h3{
  margin:0;
}

.modal-head p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:13px;
}

.modal-body{
  padding:18px;
}

.icon-btn{
  border:none;
  background:none;
  cursor:pointer;
  font-size:18px;
}

.modal-form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.modal-form-grid .full{
  grid-column:1 / -1;
}

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.table-wrap{
  overflow:auto;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th,.table td{
  border-bottom:1px solid #f1f5f9;
  padding:10px 12px;
  font-size:13px;
  text-align:left;
  vertical-align:top;
}

.table th{
  background:#eff6ff;
  position:sticky;
  top:0;
  z-index:1;
}

.pill{
  display:inline-flex;
  padding:4px 8px;
  border-radius:999px;
  background:#f8fafc;
  border:1px solid var(--line);
  font-size:12px;
}

.switch{
  display:inline-flex;
  align-items:center;
  gap:8px;
}

.small{
  font-size:12px;
  color:var(--muted);
}

.toast{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:3000;
  background:#111827;
  color:#fff;
  padding:12px 14px;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
  max-width:360px;
  font-size:13px;
  line-height:1.4;
}

.toast.success{
  background:#166534;
}

.toast.error{
  background:#b91c1c;
}

@media (max-width: 1100px){
  .layout{
    grid-template-columns:1fr;
  }
}

@media (max-width: 820px){
  .category-grid{
    grid-template-columns:repeat(2, 1fr);
  }
  .hero-search{
    flex-direction:column;
  }
  .modal-form-grid{
    grid-template-columns:1fr;
  }
}

@media (max-width: 560px){
  .category-grid{
    grid-template-columns:1fr;
  }
  .topbar{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }
}
</style>
