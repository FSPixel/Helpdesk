<style>
:root{
  --bg:#f4f7fd;
  --card:#ffffff;
  --line:#d9e0ef;
  --text:#243244;
  --muted:#6d7788;
  --blue:#5d8df0;
  --blue2:#cddcfb;
  --shadow:0 2px 10px rgba(15,23,42,.08);
}
*{box-sizing:border-box;}
html,body{width:100%;min-height:100%;}
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 10% 15%, rgba(255,255,255,.55) 0 2px, transparent 2px 100%),
    radial-gradient(circle at 85% 70%, rgba(255,255,255,.32) 0 2px, transparent 2px 100%),
    linear-gradient(180deg,#eaf1ff 0%, #f5f8fd 18%, #f7f9fd 100%);
  background-size: 180px 180px, 260px 260px, 100% 100%;
}
input,select,textarea,button{font-family:inherit;}
.app-shell{max-width:1536px;margin:0 auto;min-height:100vh;}
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 18px 10px;background:#fff;border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:flex-start;gap:10px;}
.brand-logo{font-weight:700;color:#5d8df0;letter-spacing:.2px;font-size:14px;margin-top:1px;}
.brand-title{font-weight:700;line-height:1;font-size:17px;}
.brand-sub{font-size:12px;color:#8d96a8;line-height:1.1;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.role-badge{
  display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;
  background:#eef3ff;color:#274fbc;font-size:12px;font-weight:700;text-transform:uppercase;
}
.user-pill{display:flex;align-items:center;gap:10px;}
.user-avatar{
  width:34px;height:34px;border-radius:50%;background:#dce5fb;display:grid;place-items:center;font-weight:700;
}
.user-name{font-size:14px;font-weight:700;line-height:1;}
.user-role{font-size:12px;color:var(--muted);}
.hero{
  padding:22px 18px 20px;
  text-align:center;
  background:linear-gradient(180deg, #6d98e9 0%, #cfe0fb 100%);
}
.hero-search-input{
  width:min(585px,100%);
  padding:12px 15px;
  border:1px solid #d7ddea;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.06);
  outline:none;
  background:#fff;
}
.hero h1{margin:12px 0 3px;font-size:30px;font-weight:700;}
.hero p{margin:0;color:#2f3a49;font-size:15px;}
.page{padding:14px 18px 22px;}
.section-head{
  display:flex;justify-content:space-between;align-items:center;margin:0 0 8px;
}
.section-head h2{margin:0;font-size:18px;}
.total-count{font-size:13px;color:var(--muted);}
.category-grid{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:10px;
}
.category-card{
  background:rgba(255,255,255,.88);
  border:1px solid var(--line);
  border-radius:12px;
  padding:18px 10px 14px;
  text-align:center;
  box-shadow:var(--shadow);
  min-height:120px;
}
.category-icon{font-size:30px;margin-bottom:12px;}
.category-name{font-weight:700;font-size:15px;line-height:1.15;}
.category-count{margin-top:4px;font-size:12px;color:var(--muted);}
.article-panel{
  min-height:270px;
  background:rgba(255,255,255,.84);
  border:1px solid var(--line);
  border-radius:12px;
  box-shadow:var(--shadow);
  padding:14px;
}
.article-item{padding:12px 0;border-bottom:1px solid #eef2f8;}
.article-item:last-child{border-bottom:none;}
.article-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;}
.article-title{font-weight:700;}
.article-meta{color:var(--muted);font-size:12px;margin-top:4px;}
.article-content{color:#334155;font-size:13px;margin-top:6px;}
.badge{
  display:inline-block;padding:4px 8px;border-radius:999px;background:#eef3ff;color:#274fbc;font-size:12px;margin-left:6px;
}
.row-actions{display:flex;gap:10px;flex-wrap:nowrap;}
.link-btn{border:none;background:none;cursor:pointer;padding:0;font:inherit;color:#2f66d8;}
.link-danger{color:#dc2626;}
.panel-card{
  background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px;
}
.panel-header{
  display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px;
}
.panel-header h2{margin:0;font-size:22px;}
.panel-header p{margin:4px 0 0;color:var(--muted);}
label{
  display:block;margin:12px 0 6px;font-size:13px;font-weight:700;color:#3a3f49;
}
input,select,textarea{
  width:100%;
  border:1px solid #d4dae8;
  border-radius:10px;
  padding:10px 12px;
  outline:none;
  background:#fff;
}
textarea{resize:vertical;}
.form-actions{display:flex;gap:10px;margin-top:14px;}
.btn{
  border:none;border-radius:10px;padding:11px 14px;cursor:pointer;font:inherit;transition:.15s ease;
}
.btn-primary{background:#2f66d8;color:#fff;}
.btn-secondary{background:#e7ebf3;color:#111827;}
.btn-ghost{background:#f7f9fd;color:#111827;border:1px solid var(--line);}
.muted{margin-top:6px;font-size:12px;color:var(--muted);word-break:break-all;}
.hidden{display:none;}
.modal{
  position:fixed;inset:0;background:rgba(15,23,42,.46);display:flex;align-items:center;justify-content:center;padding:18px;z-index:1000;
}
.modal.hidden{display:none !important;pointer-events:none;}
.modal-card{
  width:min(760px,100%);background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 20px 50px rgba(15,23,42,.2);
}
.modal-head{
  display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line);
}
.modal-head h3{margin:0;}
.modal-head p{margin:4px 0 0;color:var(--muted);font-size:13px;}
.modal-body{padding:18px;}
.icon-btn{border:none;background:none;cursor:pointer;font-size:18px;}
.modal-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-form-grid .full{grid-column:1 / -1;}
.toast{
  position:fixed;right:18px;bottom:18px;z-index:3000;background:#111827;color:#fff;padding:12px 14px;border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.18);max-width:360px;font-size:13px;line-height:1.4;
}
.toast.success{background:#166534;}
.toast.error{background:#b91c1c;}
.custom-cat-row{display:flex;gap:8px;align-items:center;}
.custom-cat-row input{flex:1;}
.custom-cat-row button{white-space:nowrap;}
@media (max-width:1200px){ .category-grid{grid-template-columns:repeat(3,minmax(0,1fr));} }
@media (max-width:820px){
  .topbar{flex-direction:column;align-items:flex-start;gap:10px;}
  .category-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
  .modal-form-grid{grid-template-columns:1fr;}
}
@media (max-width:560px){
  .category-grid{grid-template-columns:1fr;}
  .hero h1{font-size:24px;}
}
</style>
