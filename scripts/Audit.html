<script>
function openAuditViewer() {
  google.script.run
    .withSuccessHandler(renderAuditViewer)
    .withFailureHandler(showAuditError)
    .getAuditLogs(300);
}

function renderAuditViewer(rows) {
  const body = document.getElementById('auditBody');
  const data = rows || [];

  body.innerHTML = `
    <div class="toolbar" style="margin-bottom:12px">
      <button class="btn btn-secondary" onclick="openAuditViewer()">Refresh</button>
    </div>

    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Action</th>
            <th>Detail</th>
            <th>Actor</th>
            <th>Email</th>
            <th>Role</th>
            <th>Meta</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(r => `
            <tr>
              <td>${escapeHtml(formatDate(r.ts))}</td>
              <td>${escapeHtml(r.action || '')}</td>
              <td>${escapeHtml(r.detail || '')}</td>
              <td>${escapeHtml(r.actor || '')}</td>
              <td>${escapeHtml(r.email || '')}</td>
              <td>${escapeHtml(r.role || '')}</td>
              <td style="max-width:240px;word-break:break-all">${escapeHtml(r.meta || '')}</td>
            </tr>
          `).join('') || '<tr><td colspan="7">No logs found</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
}

function showAuditError(err) {
  const msg = (err && err.message) ? err.message : String(err || 'Audit error');
  if (typeof toast === 'function') toast(msg, 'error');
  else alert(msg);
  console.error(err);
}
</script>
