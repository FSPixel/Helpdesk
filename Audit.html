<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('Styles'); ?>
</head>
<body>
  <div style="padding:18px 18px 22px">
    <div class="section-head">
      <h2>Audit Log</h2>
      <div class="toolbar">
        <button class="btn btn-secondary" onclick="reloadLogs()">Refresh</button>
        <button class="btn btn-ghost" onclick="google.script.host.close()">Close</button>
      </div>
    </div>

    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Action</th>
            <th>Detail</th>
            <th>Actor</th>
            <th>Email</th>
            <th>Role</th>
            <th>Meta</th>
          </tr>
        </thead>
        <tbody id="auditBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    function reloadLogs() {
      google.script.run
        .withSuccessHandler(render)
        .withFailureHandler(err => alert(err.message || err))
        .getAuditLogs(300);
    }

    function render(rows) {
      document.getElementById('auditBody').innerHTML = rows.map(r => `
        <tr>
          <td>${escapeHtml(formatDate(r.ts))}</td>
          <td><span class="pill">${escapeHtml(r.action || '')}</span></td>
          <td>${escapeHtml(r.detail || '')}</td>
          <td>${escapeHtml(r.actor || '')}</td>
          <td>${escapeHtml(r.email || '')}</td>
          <td>${escapeHtml(r.role || '')}</td>
          <td style="max-width:420px;word-break:break-word">${escapeHtml(r.meta || '')}</td>
        </tr>
      `).join('');
    }

    function formatDate(d){
      try { return new Date(d).toLocaleString(); } catch(e){ return ''; }
    }
    function escapeHtml(s){
      return String(s || '').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    window.addEventListener('load', reloadLogs);
  </script>
</body>
</html>
